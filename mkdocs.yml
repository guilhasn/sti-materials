site_name: STI | Sistemas e Tecnologias de Informacao
site_url: https://guilhasn.github.io/sti-materials/
site_description: Materiais da UC Sistemas e Tecnologias de Informacao — Mestrado em Administracao Publica (ESTG-IPL)
site_author: Nuno Salvador

repo_url: https://github.com/guilhasn/sti-materials
repo_name: guilhasn/sti-materials

theme:
  name: material
  language: pt
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/ipl.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - glightbox

nav:
  - Inicio: index.md
  - Excel (Aulas 1-3):
      - Visao Geral: excel/index.md
      - Aula 1 — Tabelas Dinamicas: excel/aula-01.md
      - Aula 2 — Funcoes Condicionais: excel/aula-02.md
      - Aula 3 — Caso Integrador: excel/aula-03.md
  - BPMN (Aulas 4-5):
      - Visao Geral: bpmn/index.md
      - Aula 4 — Processo AS-IS: bpmn/aula-04.md
      - Aula 5 — Redesenho TO-BE: bpmn/aula-05.md
  - Referencia:
      - Cheatsheet BPMN 2.0: referencia/cheatsheet-bpmn.md
      - Guia bpmn.io: referencia/guia-bpmnio.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guilhasn/sti-materials

copyright: "&copy; 2025-2026 STI MAP | ESTG-IPL, Leiria"
