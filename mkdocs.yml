site_name: STI | Sistemas e Tecnologias de Informacao
site_url: https://guilhasn.github.io/sti-materials/
site_description: Materiais da UC Sistemas e Tecnologias de Informacao - Mestrado em Administracao Publica (ESTG-IPL)
site_author: Nuno Salvador

repo_url: https://github.com/guilhasn/sti-materials
repo_name: guilhasn/sti-materials

theme:
  name: material
  custom_dir: overrides
  language: pt
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/ipl.css

extra_javascript:
  - assets/extra.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - glightbox

nav:
  - Inicio: index.md
  - Excel:
      - Visao Geral: excel/index.md
      - Tabelas Dinamicas: excel/aula-01.md
      - Funcoes Condicionais: excel/aula-02.md
      - Caso Integrador: excel/aula-03.md
  - BPMN:
      - Visao Geral: bpmn/index.md
      - Mapeamento AS-IS: bpmn/aula-04.md
      - Redesenho TO-BE: bpmn/aula-05.md
      - Exercicios Guiados: bpmn/casos-guiados.md
      - Exercicios: bpmn/exercicios.md
  - Modelacao de Dados:
      - Visao Geral: er/index.md
      - Do Excel ao Modelo Conceptual: er/aula-06.md
      - Das Relacoes as Tabelas: er/aula-07.md
      - Da Concepcao a Especificacao: er/aula-08.md
      - Exercicios Guiados: er/casos-guiados.md
      - Exercicios: er/exercicios.md
      - Auto-avaliacao: er/avaliacao.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guilhasn/sti-materials

copyright: "&copy; 2025-2026 STI MAP | ESTG-IPL, Leiria"
