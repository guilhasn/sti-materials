site_name: STI | Sistemas e Tecnologias de Informação
site_url: https://guilhasn.github.io/sti-materials/
site_description: Materiais da UC Sistemas e Tecnologias de Informação — Mestrado em Administração Pública (ESTG-IPL)
site_author: Nuno Salvador

repo_url: https://github.com/guilhasn/sti-materials
repo_name: guilhasn/sti-materials

theme:
  name: material
  custom_dir: overrides
  language: pt
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/ipl.css

extra_javascript:
  - assets/extra.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - glightbox

nav:
  - Início: index.md
  - Excel (Aulas 1–3):
      - Visão Geral: excel/index.md
      - Tabelas Dinâmicas: excel/aula-01.md
      - Funções Condicionais: excel/aula-02.md
      - Caso Integrador: excel/aula-03.md
  - BPMN (Aulas 4–5):
      - Visão Geral: bpmn/index.md
      - Mapeamento AS-IS: bpmn/aula-04.md
      - Redesenho TO-BE: bpmn/aula-05.md
      - Casos Práticos Guiados: bpmn/casos-guiados.md
      - Exercícios Práticos: bpmn/exercicios.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guilhasn/sti-materials

copyright: "&copy; 2025–2026 STI MAP | ESTG-IPL, Leiria"
